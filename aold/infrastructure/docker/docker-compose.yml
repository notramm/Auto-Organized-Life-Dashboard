version: '3.9'

# ═══════════════════════════════════════════════════════════════
# AOLD — Local Development Infrastructure
# Run: npm run docker:up
# Services: PostgreSQL, Redis, Kafka, Zookeeper, MinIO (S3-local)
# ═══════════════════════════════════════════════════════════════

name: aold-dev

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  minio_data:

networks:
  aold-network:
    driver: bridge

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aold-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aold_user
      POSTGRES_PASSWORD: aold_dev_password_change_in_production
      POSTGRES_DB: aold_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - aold-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aold_user -d aold_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aold-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aold-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (Kafka dependency) ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: aold-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - aold-network

  # ── Apache Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aold-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - aold-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka UI (Dev only) ──────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aold-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: aold-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - aold-network

  # ── Kafka Topic Initializer ──────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aold-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aold-network
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.uploaded --replication-factor 1 --partitions 4
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.processed --replication-factor 1 --partitions 4
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.processing-failed --replication-factor 1 --partitions 2
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic embedding.created --replication-factor 1 --partitions 4
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic search.performed --replication-factor 1 --partitions 2
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic file.deleted --replication-factor 1 --partitions 2
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user.events --replication-factor 1 --partitions 2
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic insights.triggers --replication-factor 1 --partitions 1
      echo 'All Kafka topics created!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  # ── MinIO (S3-compatible local storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aold-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    networks:
      - aold-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Initializer ─────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: aold-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - aold-network
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Initializing MinIO buckets...'
      mc alias set minio http://minio:9000 minioadmin minioadmin123
      mc mb --ignore-existing minio/aold-files-dev
      mc anonymous set none minio/aold-files-dev
      echo 'MinIO initialized!'
      "

  # ── Redis Commander (Dev only) ────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aold-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - aold-network
    depends_on:
      redis:
        condition: service_healthy